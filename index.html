<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apollo Scenario Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <header class="brand">
          <div>
            <h1>Apollo Scenario Viewer</h1>
            <p>JSON-only obstacle and route visualizer</p>
          </div>
        </header>

        <section class="panel">
          <label class="field">
            <span>场景样本</span>
            <select id="sampleSelect" multiple></select>
          </label>
          <div class="sample-actions">
            <button id="selectAllSamplesButton" type="button">全选</button>
            <button id="clearSamplesButton" type="button">清空</button>
          </div>
          <label class="upload" for="fileInput">
            <span>上传 scenario JSON</span>
            <input id="fileInput" type="file" accept=".json,application/json" multiple />
          </label>
        </section>

        <section class="panel">
          <h2>HDMap</h2>
          <label class="field">
            <span>高精地图</span>
            <select id="hdmapSelect"></select>
          </label>
          <div id="hdmapStatus" class="status-line">未加载</div>
        </section>

        <section class="panel">
          <h2>Scenario 图层</h2>
          <div id="scenarioLayerToggles" class="toggles"></div>
        </section>

        <section class="panel">
          <h2>HDMap 图层</h2>
          <div id="hdmapLayerToggles" class="toggles"></div>
        </section>

        <section class="panel">
          <h2>路由点</h2>
          <div class="route-controls">
            <label class="toggle">
              <input id="routeAddToggle" type="checkbox" checked />
              <span>点击添加</span>
            </label>
            <label class="toggle">
              <input id="routeConnectToggle" type="checkbox" checked />
              <span>连接路由点</span>
            </label>
            <button id="exportRouteButton" type="button">导出</button>
            <button id="clearRouteButton" type="button">清空</button>
          </div>
          <div id="routePointList" class="route-point-list"></div>
        </section>

        <section class="panel">
          <h2>路径曲线</h2>
          <div class="path-controls">
            <label class="toggle">
              <input id="pathEditToggle" type="checkbox" />
              <span>编辑曲线</span>
            </label>
            <label class="field compact-field">
              <span>分辨率(m)</span>
              <input id="pathResolutionInput" type="number" min="0.1" step="0.1" value="1" />
            </label>
            <button id="exportPathButton" type="button">导出离散点</button>
            <button id="clearPathButton" type="button">清空曲线</button>
          </div>
          <div id="pathPointList" class="route-point-list"></div>
        </section>

        <section class="panel">
          <h2>信息</h2>
          <div id="summary" class="summary"></div>
        </section>

        <section class="panel list-panel">
          <h2>对象</h2>
          <div id="objectList" class="object-list"></div>
        </section>
      </aside>

      <main class="stage">
        <div class="toolbar">
          <button id="fitButton" type="button">适配</button>
          <button id="resetButton" type="button">重置视图</button>
          <span id="cursorReadout">x: -, y: -</span>
        </div>
        <canvas id="viewer" width="1600" height="1000"></canvas>
        <div class="legend">
          <span><i class="ego"></i>主车起终点</span>
          <span><i class="lane"></i>Lane中心/边界</span>
          <span><i class="route"></i>路由点</span>
          <span><i class="path"></i>路径曲线</span>
          <span><i class="junction"></i>路口/区域</span>
          <span><i class="static"></i>静态障碍物</span>
          <span><i class="vehicle"></i>车辆</span>
          <span><i class="traffic"></i>红绿灯</span>
          <span><i class="dynamic"></i>动态交通</span>
        </div>
      </main>
    </div>

    <div id="exportModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="modal-head">
          <h2 id="exportModalTitle">导出</h2>
          <button id="closeExportButton" type="button">关闭</button>
        </div>
        <textarea id="routeExportText" readonly></textarea>
      </div>
    </div>

    <script src="./app.js?v=20260514-multiselect-path"></script>
  </body>
</html>
